<main>
  <section class="enjoy">
    <div class="container">
      <div class="date_block">
        <h2 class="subtitle">Насладись прогулкой в горах с командой единомышленников</h2>
        <div class="inputs_form">
          <div class="form_list">
            <input class="line" list="cities" placeholder="Выберите город" />
            <datalist id="cities">
              <option value="Бишкек"></option>
              <option value="Ош"></option>
              <option value="Каракол"></option>
            </datalist>
            <label>выберите из списка</label>
          </div>
          <div class="form_list">
            <input class="line" type="date" id="date" placeholder="Дата похода" />
            <label for="date">укажите дату:</label>
          </div>

          <div class="form_list">
            <input list="users" class="line" id="inputt" placeholder="Участники" />
            <datalist id="users">
              <option value="Aisha"></option>
              <option value="usuf"></option>
              <option value="Zhanarbek"></option>
            </datalist>
            <label for="inputt">выберите из списка</label>
          </div>
          <button class="enjoy_btn">Найти программу</button>
        </div>
      </div>
    </div>
  </section>
</main>
